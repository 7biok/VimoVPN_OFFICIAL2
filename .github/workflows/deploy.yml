name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      APP_DOMAIN: vimovpn.icu
      SHOPBOT_PROJECT_ROOT: /app/data
      HOST_DATA_DIR: /srv/vimovpn/data
      HOST_CADDY_DATA_DIR: /srv/vimovpn/caddy/data
      HOST_CADDY_CONFIG_DIR: /srv/vimovpn/caddy/config
      LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
      SHOPBOT_SECRET_KEY: ${{ secrets.SHOPBOT_SECRET_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate runner and resolve compose command
        shell: bash
        run: |
          test -n "$LETSENCRYPT_EMAIL" || { echo "LETSENCRYPT_EMAIL secret is required"; exit 1; }
          test -n "$SHOPBOT_SECRET_KEY" || { echo "SHOPBOT_SECRET_KEY secret is required"; exit 1; }
          docker version

          if docker compose version >/dev/null 2>&1; then
            echo "COMPOSE_CMD=docker compose" >> "$GITHUB_ENV"
            docker compose version
          elif command -v docker-compose >/dev/null 2>&1; then
            echo "COMPOSE_CMD=docker-compose" >> "$GITHUB_ENV"
            docker-compose version
          else
            echo "Neither 'docker compose' nor 'docker-compose' is available on this runner"
            exit 1
          fi

      - name: Prepare persistent directories
        shell: bash
        run: |
          sudo mkdir -p \
            "$HOST_DATA_DIR/backups" \
            "$HOST_CADDY_DATA_DIR" \
            "$HOST_CADDY_CONFIG_DIR"
          sudo chown -R "$USER:$USER" \
            "$HOST_DATA_DIR" \
            "$HOST_CADDY_DATA_DIR" \
            "$HOST_CADDY_CONFIG_DIR"

      - name: Show deploy target
        shell: bash
        run: |
          echo "Deploying to self-hosted runner on $(hostname)"
          echo "Domain: $APP_DOMAIN"
          echo "Runtime data: $HOST_DATA_DIR"
          echo "Compose command: $COMPOSE_CMD"

      - name: Deploy stack
        shell: bash
        run: |
          bash -lc "$COMPOSE_CMD -f docker-compose.prod.yml up -d --build --remove-orphans"

      - name: Show running services
        shell: bash
        run: |
          bash -lc "$COMPOSE_CMD -f docker-compose.prod.yml ps"
